# Workflow to build and deploy Next.js site to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"] # Support both default branch names
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            export NEXT_PUBLIC_BASE_PATH=""
          else
            export NEXT_PUBLIC_BASE_PATH="/$REPO_NAME"
          fi
          echo "Injecting static export configurations into next.config.ts"
          node -e '
            const fs = require("fs");
            let c = fs.readFileSync("next.config.ts", "utf8");
            c = c.replace(/const nextConfig: NextConfig = \{/, `const nextConfig: NextConfig = {
              output: "export",
              images: { unoptimized: true },
              basePath: process.env.NEXT_PUBLIC_BASE_PATH || "",`);
            fs.writeFileSync("next.config.ts", c);
          '
          echo "Building with NEXT_PUBLIC_BASE_PATH=$NEXT_PUBLIC_BASE_PATH"
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
